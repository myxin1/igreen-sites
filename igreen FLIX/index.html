<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>iGreen FLIX — Quem está assistindo?</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html { max-width: 100%; overflow-x: hidden; }

    body {
      overflow-x: hidden;
      background-color: #141414;
      font-family: 'Netflix Sans', 'Helvetica Neue', Helvetica, Arial, sans-serif;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    main {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 60px 24px;
    }

    h1 {
      color: #ffffff;
      font-size: 3.4rem;
      font-weight: 700;
      margin-bottom: 48px;
      text-align: center;
    }

    .profiles {
      display: flex;
      gap: 40px;
      flex-wrap: wrap;
      justify-content: center;
    }

    .profile-card {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 16px;
      cursor: pointer;
      text-decoration: none;
      background: none;
      border: none;
      padding: 0;
    }

    .profile-card:hover .avatar { border: 4px solid #ffffff; transform: scale(1.05); }
    .profile-card:hover .profile-name { color: #ffffff; }

    .avatar {
      width: 180px;
      height: 180px;
      border-radius: 6px;
      border: 4px solid transparent;
      transition: border 0.15s ease, transform 0.15s ease;
      object-fit: cover;
      display: block;
      background: #2a2a2a;
    }

    .profile-name {
      color: #808080;
      font-size: 1rem;
      transition: color 0.15s ease;
    }

    .manage { margin-top: 56px; }

    .manage a {
      color: #808080;
      text-decoration: none;
      font-size: 0.95rem;
      border: 1px solid #808080;
      padding: 10px 24px;
      letter-spacing: 1px;
      text-transform: uppercase;
      transition: color 0.15s, border-color 0.15s;
    }

    .manage a:hover { color: #ffffff; border-color: #ffffff; }

    /* ── SENHA OVERLAY ── */
    .pwd-overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.88);
      z-index: 100;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }
    .pwd-overlay.open { display: flex; }
    .pwd-box {
      background: #1a1a1a;
      border: 1px solid #333;
      border-radius: 10px;
      padding: 40px 36px;
      width: 100%;
      max-width: 320px;
      text-align: center;
    }
    .pwd-avatar {
      width: 100px;
      height: 100px;
      border-radius: 6px;
      object-fit: cover;
      border: 3px solid #333;
      margin-bottom: 14px;
      background: #2a2a2a;
      display: block;
      margin-left: auto;
      margin-right: auto;
    }
    .pwd-profile-name {
      color: #fff;
      font-size: 1.15rem;
      font-weight: 700;
      margin-bottom: 22px;
    }
    .pwd-field-wrap {
      position: relative;
      width: 100%;
      margin-bottom: 10px;
    }
    .pwd-box input[type="password"],
    .pwd-box input[type="text"].pwd-visible {
      width: 100%;
      padding: 12px 44px 12px 16px;
      background: #111;
      border: 1px solid #333;
      border-radius: 6px;
      color: #fff;
      font-size: 1rem;
      outline: none;
      transition: border-color 0.15s;
      font-family: inherit;
      box-sizing: border-box;
    }
    .pwd-box input:focus { border-color: #2ecc40; }
    .pwd-toggle-btn {
      position: absolute;
      right: 10px;
      top: 50%;
      transform: translateY(-50%);
      background: none;
      border: none;
      cursor: pointer;
      color: #555;
      padding: 4px;
      display: flex;
      align-items: center;
      transition: color 0.15s;
    }
    .pwd-toggle-btn:hover { color: #aaa; }
    .pwd-toggle-btn svg { width: 18px; height: 18px; fill: currentColor; display: block; }
    .pwd-error {
      color: #e74c3c;
      font-size: 0.82rem;
      margin-bottom: 10px;
      display: none;
    }
    .pwd-btn-enter {
      width: 100%;
      padding: 12px;
      background: #2ecc40;
      color: #000;
      border: none;
      border-radius: 6px;
      font-size: 1rem;
      font-weight: 800;
      cursor: pointer;
      transition: background 0.15s;
      margin-bottom: 12px;
    }
    .pwd-btn-enter:hover { background: #27ae60; }
    .pwd-btn-cancel {
      background: none;
      border: none;
      color: #555;
      font-size: 0.85rem;
      cursor: pointer;
      transition: color 0.15s;
    }
    .pwd-btn-cancel:hover { color: #999; }

    footer {
      text-align: center;
      padding: 24px;
      color: #404040;
      font-size: 0.78rem;
    }

    @media (max-width: 480px) {
      main { padding: 48px 20px; }
      h1 { font-size: 1.8rem; margin-bottom: 32px; }
      .profiles { gap: 20px; }
      .avatar { width: 130px; height: 130px; }
      .profile-name { font-size: 0.9rem; }
      .manage { margin-top: 40px; }
      .manage a { padding: 10px 20px; font-size: 0.85rem; }
      .pwd-box { padding: 32px 24px; }
    }
  </style>
</head>
<body>

  <main>
    <h1>Quem está assistindo?</h1>
    <div class="profiles" id="profilesContainer"></div>
    <div class="manage">
      <a href="admin.html">Gerenciar Perfis</a>
    </div>
  </main>

  <footer>
    &copy; 2026 iGreen FLIX. Todos os direitos reservados.
  </footer>

  <!-- Overlay de senha -->
  <div class="pwd-overlay" id="pwdOverlay">
    <div class="pwd-box">
      <img class="pwd-avatar" id="pwdAvatar" src="" alt="">
      <div class="pwd-profile-name" id="pwdProfileName"></div>
      <div class="pwd-field-wrap">
        <input type="password" id="pwdField" placeholder="Digite a senha"
               onkeydown="if(event.key==='Enter')doProfileLogin()">
        <button class="pwd-toggle-btn" type="button" onclick="togglePwdVisibility('pwdField',this)" tabindex="-1" aria-label="Mostrar/ocultar senha">
          <svg id="pwdEyeIcon" viewBox="0 0 24 24"><path d="M12 4.5C7 4.5 2.73 7.61 1 12c1.73 4.39 6 7.5 11 7.5s9.27-3.11 11-7.5c-1.73-4.39-6-7.5-11-7.5zm0 12.5c-2.76 0-5-2.24-5-5s2.24-5 5-5 5 2.24 5 5-2.24 5-5 5zm0-8c-1.66 0-3 1.34-3 3s1.34 3 3 3 3-1.34 3-3-1.34-3-3-3z"/></svg>
        </button>
      </div>
      <div class="pwd-error" id="pwdError">Senha incorreta. Tente novamente.</div>
      <button class="pwd-btn-enter" onclick="doProfileLogin()">Entrar</button>
      <button class="pwd-btn-cancel" onclick="cancelProfileLogin()">Cancelar</button>
    </div>
  </div>

  <script>
    const DEFAULT_PROFILES = [
      { id: 'p1', name: 'João',  avatar: 'images/perfil 1.png', password: '' },
      { id: 'p2', name: 'Maria', avatar: 'images/perfil 2.jpg', password: '' }
    ];

    let profiles = [];
    let pendingIdx = -1;

    const PAGE_SLUG = new URLSearchParams(location.search).get('slug');
    let _pageData = null;
    if (PAGE_SLUG) {
      try {
        var _gc = (function(){ try{return JSON.parse(localStorage.getItem('igreen_github')||'null');}catch(e){return null;} })();
        var _o=_gc&&_gc.owner?_gc.owner:'myxin1',_r=_gc&&_gc.repo?_gc.repo:'transcricao-audio',_br=_gc&&_gc.branch?_gc.branch:'main',_p=_gc&&_gc.path?_gc.path:'igreen-configs';
        var _xhr=new XMLHttpRequest();
        _xhr.open('GET','https://raw.githubusercontent.com/'+_o+'/'+_r+'/'+_br+'/'+_p+'/'+PAGE_SLUG+'.json?_='+Date.now(),false);
        _xhr.send();
        if(_xhr.status===200){var _b=JSON.parse(_xhr.responseText);_pageData=_b.igreen_data||null;}
      } catch(e) {}
    }

    function getData() {
      if (_pageData) return _pageData;
      try { return JSON.parse(localStorage.getItem('igreen_data')) || {}; } catch(e) { return {}; }
    }

    function escAttr(s) {
      return String(s || '').replace(/&/g,'&amp;').replace(/"/g,'&quot;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
    }

    function render() {
      const data = getData();
      const raw = (data.profiles && data.profiles.length) ? data.profiles : DEFAULT_PROFILES;
      profiles = raw.map(function(p, i) {
        return { id: p.id || ('p' + (i + 1)), name: p.name || '', avatar: p.avatar || '', password: p.password || '' };
      });

      document.getElementById('profilesContainer').innerHTML = profiles.map(function(p, i) {
        return '<button class="profile-card" onclick="selectProfile(' + i + ')">' +
          '<img class="avatar" src="' + escAttr(p.avatar) + '" alt="' + escAttr(p.name) + '">' +
          '<span class="profile-name">' + escAttr(p.name) + '</span>' +
          '</button>';
      }).join('');
    }

    function selectProfile(index) {
      const p = profiles[index];
      if (!p) return;
      if (p.password) {
        pendingIdx = index;
        document.getElementById('pwdAvatar').src = p.avatar;
        document.getElementById('pwdProfileName').textContent = p.name;
        document.getElementById('pwdField').value = '';
        document.getElementById('pwdError').style.display = 'none';
        document.getElementById('pwdOverlay').classList.add('open');
        setTimeout(function() { document.getElementById('pwdField').focus(); }, 60);
      } else {
        activateProfile(index);
      }
    }

    function doProfileLogin() {
      const p = profiles[pendingIdx];
      if (!p) return;
      if (document.getElementById('pwdField').value === p.password) {
        document.getElementById('pwdOverlay').classList.remove('open');
        activateProfile(pendingIdx);
      } else {
        document.getElementById('pwdError').style.display = 'block';
        document.getElementById('pwdField').select();
      }
    }

    function cancelProfileLogin() {
      document.getElementById('pwdOverlay').classList.remove('open');
      pendingIdx = -1;
    }

    function togglePwdVisibility(fieldId, btn) {
      const inp = document.getElementById(fieldId);
      const showing = inp.type === 'text';
      inp.type = showing ? 'password' : 'text';
      btn.querySelector('svg').innerHTML = showing
        ? '<path d="M12 4.5C7 4.5 2.73 7.61 1 12c1.73 4.39 6 7.5 11 7.5s9.27-3.11 11-7.5c-1.73-4.39-6-7.5-11-7.5zm0 12.5c-2.76 0-5-2.24-5-5s2.24-5 5-5 5 2.24 5 5-2.24 5-5 5zm0-8c-1.66 0-3 1.34-3 3s1.34 3 3 3 3-1.34 3-3-1.34-3-3-3z"/>'
        : '<path d="M12 7c2.76 0 5 2.24 5 5 0 .65-.13 1.26-.36 1.83l2.92 2.92c1.51-1.26 2.7-2.89 3.43-4.75-1.73-4.39-6-7.5-11-7.5-1.4 0-2.74.25-3.98.7l2.16 2.16C10.74 7.13 11.35 7 12 7zM2 4.27l2.28 2.28.46.46C3.08 8.3 1.78 10.02 1 12c1.73 4.39 6 7.5 11 7.5 1.55 0 3.03-.3 4.38-.84l.42.42L19.73 22 21 20.73 3.27 3 2 4.27zM7.53 9.8l1.55 1.55c-.05.21-.08.43-.08.65 0 1.66 1.34 3 3 3 .22 0 .44-.03.65-.08l1.55 1.55c-.67.33-1.41.53-2.2.53-2.76 0-5-2.24-5-5 0-.79.2-1.53.53-2.2zm4.31-.78 3.15 3.15.02-.16c0-1.66-1.34-3-3-3l-.17.01z"/>';
      btn.style.color = showing ? '#555' : '#2ecc40';
    }

    function activateProfile(index) {
      localStorage.setItem('igreen_active_profile', JSON.stringify(profiles[index]));
      var target = PAGE_SLUG ? ('apresentacao.html?slug=' + encodeURIComponent(PAGE_SLUG)) : 'apresentacao.html';
      window.location.href = target;
    }

    render();
  </script>

</body>
</html>
