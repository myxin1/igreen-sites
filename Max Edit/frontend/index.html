async function loadBatches(el) {
  el.innerHTML = `<div class="loading">${spin(22)}</div>`;
  try {
    S.batches = await api.getBatches().catch(()=>[]) || [];
    updateBadges();
    if (S.batches.length===0) { el.innerHTML=`<div class="empty" style="padding:80px 20px"><svg viewBox="0 0 48 48" fill="none" stroke="currentColor" stroke-width="1.3"><path d="M4 8h40M4 20h40M4 32h28"/></svg><h3>Nenhum lote ainda</h3><p>Crie um lote, envie os videos e renderize.</p><button class="btn btn-primary" onclick="openBatchModal()">+ Novo Lote</button></div>`; return; }
    el.innerHTML = `<div class="batch-list">${S.batches.map(b => {
      const ap = b.renderJobs?.length ? Math.round(b.renderJobs.reduce((s,j)=>s+(j.progress||0),0)/b.renderJobs.length) : 0;
      return `<div class="batch-row" onclick="navigate('batches','${b.id}')"><div><div class="batch-name">${b.name}</div><div class="batch-when">${fmtDate(b.createdAt)}</div></div><span class="mono small c3">${b.sourceVideos?.length||0} videos</span>${['rendering','processing'].includes(b.status)?`<div style="min-width:100px">${prog(ap)}</div>`:'<div></div>'}${badge(b.status)}</div>`;
    }).join('')}</div>`;
  } catch(e) { el.innerHTML=`<div class="empty"><h3>Error</h3><p>${e.message}</p></div>`; }
}

/* ГўвҖқВҒГўвҖқВҒГўвҖқВҒГўвҖқВҒГўвҖқВҒГўвҖқВҒГўвҖқВҒГўвҖқВҒГўвҖқВҒГўвҖқВҒГўвҖқВҒГўвҖқВҒГўвҖқВҒГўвҖқВҒГўвҖқВҒГўвҖқВҒГўвҖқВҒГўвҖқВҒГўвҖқВҒГўвҖқВҒГўвҖқВҒГўвҖқВҒГўвҖқВҒГўвҖқВҒГўвҖқВҒГўвҖқВҒГўвҖқВҒГўвҖқВҒГўвҖқВҒГўвҖқВҒГўвҖқВҒГўвҖқВҒГўвҖқВҒГўвҖқВҒГўвҖқВҒГўвҖқВҒ
   VIEW: BATCH DETAIL
ГўвҖқВҒГўвҖқВҒГўвҖқВҒГўвҖқВҒГўвҖқВҒГўвҖқВҒГўвҖқВҒГўвҖқВҒГўвҖқВҒГўвҖқВҒГўвҖқВҒГўвҖқВҒГўвҖқВҒГўвҖқВҒГўвҖқВҒГўвҖқВҒГўвҖқВҒГўвҖқВҒГўвҖқВҒГўвҖқВҒГўвҖқВҒГўвҖқВҒГўвҖқВҒГўвҖқВҒГўвҖқВҒГўвҖқВҒГўвҖқВҒГўвҖқВҒГўвҖқВҒГўвҖқВҒГўвҖқВҒГўвҖқВҒГўвҖқВҒГўвҖқВҒГўвҖқВҒГўвҖқВҒ */
async function loadBatchDetail(batchId) {
  const el = document.getElementById('content');
  el.innerHTML = `<div class="loading">${spin(22)}</div>`;
  try {
    const [batch, videos, templates] = await Promise.all([
      api.getBatch(batchId),
      api.getBatchVideos(batchId).catch(()=>[]),
      api.getTemplates().catch(()=>[]),
    ]);
    S.templates = templates || [];
    const vids = videos || [], jobs = batch.renderJobs || [];
    const isRend = ['rendering','processing'].includes(batch.status), isDone = ['done','completed'].includes(batch.status);
    if (isRend) startPoll(batchId);
    const videoChips = vids.length > 0
      ? `<div class="vchips" style="margin-bottom:12px">${vids.map(v => `<div class="vchip"><span class="vchip-name">${v.originalFilename}</span><span class="vchip-sz">${fmtBytes(v.size)}</span></div>`).join('')}</div>`
      : '';
    const jobsDone = jobs.filter(j => ['done','completed'].includes(j.status)).length;
    const jobRows = jobs.map(j => {
      const download = ['done','completed'].includes(j.status)
        ? `<button class="btn btn-ghost btn-sm" onclick="api.downloadRender('${j.id}','${j.sourceVideo?.originalFilename || 'render.mp4'}')"><svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"><path d="M8 2v8M5 7l3 3 3-3"/><path d="M2 13h12"/></svg>DL</button>`
        : '';
      return `<div class="render-item" data-jid="${j.id}"><div><div class="r-name">${j.sourceVideo?.originalFilename || 'video'}</div><div class="r-meta mono">${j.status}</div></div><div class="r-prog-col"><div class="r-prog-top"><span class="job-badge">${badge(j.status)}</span><span class="r-pct">${j.progress || 0}%</span></div>${prog(j.progress)}</div><div>${download}</div></div>`;
    }).join('');
    const jobsCard = jobs.length > 0
      ? `<div class="card" style="margin-top:12px"><div class="card-title">Jobs de Render (${jobs.length})</div><div style="display:flex;flex-direction:column;gap:7px">${jobRows}</div></div>`
      : '';
    const templateOptions = S.templates.map(t => `<option value="${t.id}">${t.name} ГӮВ· ${t.outputWidth}ГғвҖ”${t.outputHeight}</option>`).join('');
    const zipButton = isDone
      ? `<button class="btn btn-primary btn-sm" onclick="api.downloadZip('${batchId}','${batch.name}-renders.zip')"><svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"><path d="M8 2v8M5 7l3 3 3-3"/><path d="M2 13h12"/></svg>Baixar ZIP</button>`
      : '';
    const renderButtonContent = isRend
      ? `${spin(13)} Renderizando...`
      : isDone
        ? '&#10003; ConcluГӯdo'
        : '<svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.8"><circle cx="8" cy="8" r="6.5"/><path d="M6.5 5.5L11 8l-4.5 2.5V5.5Z" fill="currentColor" stroke="none"/></svg> Iniciar Render';
    const uploadHint = vids.length === 0 ? `<p class="small c3" style="margin-top:8px;text-align:center">Envie os videos primeiro</p>` : '';
    const jobsInfo = jobs.length ? `<div class="info-row"><span class="info-key">Jobs</span><span class="mono">${jobsDone}/${jobs.length} prontos</span></div>` : '';

    el.innerHTML = `
      <div class="panel-back" onclick="S.activeBatch=null;navigate('batches')">
        <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M10 4L6 8l4 4"/></svg>
        Voltar para Lotes
      </div>
      <div class="panel-head">
        <div class="panel-title">${batch.name}</div>
        ${badge(batch.status)}
        ${zipButton}
      </div>
      <div class="panel-grid">
        <div>
          <div class="card">
            <div class="card-title">Videos-Fonte (${vids.length})</div>
            ${videoChips}
            <div id="upload-area">${mkUpz('vid-inp',true)}</div>
          </div>
          ${jobsCard}
        </div>
        <div>
          <div class="card">
            <div class="card-title">Iniciar Render</div>
            <div class="fg"><label>Template</label><select id="rnd-tpl"><option value="">-- Selecione um template --</option>${templateOptions}</select></div>
            <button class="btn btn-primary w-full" id="rnd-btn" onclick="doStartRender('${batchId}')" ${isRend||isDone||vids.length===0?'disabled':''}>
              ${renderButtonContent}
            </button>
            ${uploadHint}
          </div>
          <div class="card" style="margin-top:12px">
            <div class="card-title">InformaГ§Гөes do Lote</div>
            <div class="info-row"><span class="info-key">ID</span><span class="mono small c3">${batch.id.slice(0,12)}...</span></div>
            <div class="info-row"><span class="info-key">Criado em</span><span class="mono small">${fmtDate(batch.createdAt)}</span></div>
            <div class="info-row"><span class="info-key">Videos</span><span class="mono">${vids.length}</span></div>
            <div class="info-row"><span class="info-key">Status</span>${badge(batch.status)}</div>
            ${jobsInfo}
          </div>
        </div>
      </div>`;
    attachUpload(batchId);
  } catch(e) { el.innerHTML=`<div class="empty"><h3>Error</h3><p>${e.message}</p></div>`; }
}

function mkUpz(inputId, multi) {
  return `<div class=вҖқupzвҖқ id=вҖқzone-${inputId}вҖқ><input type=вҖқfileвҖқ id=вҖқ${inputId}вҖқ accept=вҖқvideo/*вҖқ ${multi?'multiple':''}/><div class=вҖқupz-iconвҖқ><svg viewBox=вҖқ0 0 24 24вҖқ fill=вҖқnoneвҖқ stroke=вҖқcurrentColorвҖқ stroke-width=вҖқ1.4вҖқ stroke-linecap=вҖқroundвҖқ><path d=вҖқM12 16V4M8 8l4-4 4 4вҖқ/><path d=вҖқM4 16v2a2 2 0 002 2h12a2 2 0 002-2v-2вҖқ/></svg></div><div class=вҖқupz-titleвҖқ>${multi?'Arraste os videos aqui ou clique para buscar':'Arraste o video aqui ou clique para buscar'}</div><div class=вҖқupz-subвҖқ>${multi?'MP4, MOV, AVI -- vГЎrios arquivos':'MP4, MOV, AVI'}</div><div class=вҖқupz-fileвҖқ id=вҖқ${inputId}-lblвҖқ></div></div>`;
}

function attachUpload(batchId) {
  const inp = document.getElementById('vid-inp');
  if (!inp) return;
  inp.addEventListener('change', async () => {
    const files = Array.from(inp.files||[]);
    if (!files.length) return;
    document.getElementById('vid-inp-lbl').textContent = `${files.length} arquivo${files.length>1?'s':''} selecionado${files.length>1?'s':''}`;
    toast(`Enviando ${files.length} video${files.length>1?'s':''}...`, 'Aguarde...', 'info');
    const fd = new FormData();
    files.forEach(f => fd.append('videos', f));
    try { await api.uploadVideos(batchId, fd); toast('Upload concluido!', `${files.length} video${files.length>1?'s':''} pronto${files.length>1?'s':''}.`, 'success'); await loadBatchDetail(batchId); }
    catch(e) { toast('Falha no upload', e.message, 'error'); }
  });
  const zone = document.getElementById('zone-vid-inp');
  if (zone) {
    zone.addEventListener('dragover', e => { e.preventDefault(); zone.classList.add('drag'); });
    zone.addEventListener('dragleave', () => zone.classList.remove('drag'));
    zone.addEventListener('drop', e => { e.preventDefault(); zone.classList.remove('drag'); Object.defineProperty(inp,'files',{value:e.dataTransfer.files,configurable:true}); inp.dispatchEvent(new Event('change')); });
  }
}

async function doStartRender(batchId) {
  const tplId = document.getElementById('rnd-tpl')?.value;
  if (!tplId) { toast('Nenhum template selecionado','Selecione um template primeiro.','error'); return; }
  const btn = document.getElementById('rnd-btn');
  if (btn) { btn.disabled=true; btn.innerHTML=`${spin(13)} Iniciando...`; }
  try { await api.startRender(batchId, tplId); toast('Render iniciado!','Processando videos com FFmpeg...','success'); await loadBatchDetail(batchId); }
  catch(e) { toast('Falha no render',e.message,'error'); if(btn){btn.disabled=false;btn.textContent='Iniciar Render';} }
}

/* ГўвҖқВҒГўвҖқВҒГўвҖқВҒГўвҖқВҒГўвҖқВҒГўвҖқВҒГўвҖқВҒГўвҖқВҒГўвҖқВҒГўвҖқВҒГўвҖқВҒГўвҖқВҒГўвҖқВҒГўвҖқВҒГўвҖқВҒГўвҖқВҒГўвҖқВҒГўвҖқВҒГўвҖқВҒГўвҖқВҒГўвҖқВҒГўвҖқВҒГўвҖқВҒГўвҖқВҒГўвҖқВҒГўвҖқВҒГўвҖқВҒГўвҖқВҒГўвҖқВҒГўвҖқВҒГўвҖқВҒГўвҖқВҒГўвҖқВҒГўвҖқВҒГўвҖқВҒГўвҖқВҒ
   VIEW: RENDERS
ГўвҖқВҒГўвҖқВҒГўвҖқВҒГўвҖқВҒГўвҖқВҒГўвҖқВҒГўвҖқВҒГўвҖқВҒГўвҖқВҒГўвҖқВҒГўвҖқВҒГўвҖқВҒГўвҖқВҒГўвҖқВҒГўвҖқВҒГўвҖқВҒГўвҖқВҒГўвҖқВҒГўвҖқВҒГўвҖқВҒГўвҖқВҒГўвҖқВҒГўвҖқВҒГўвҖқВҒГўвҖқВҒГўвҖқВҒГўвҖқВҒГўвҖқВҒГўвҖқВҒГўвҖқВҒГўвҖқВҒГўвҖқВҒГўвҖқВҒГўвҖқВҒГўвҖқВҒГўвҖқВҒ */
async function loadRenders(el) {
  el.innerHTML = `<div class="loading">${spin(22)}</div>`;
  try {
    S.batches = await api.getBatches().catch(()=>[]) || [];
    const allJobs = S.batches.flatMap(b => (b.renderJobs||[]).map(j => ({...j, batchName:b.name})));
    if (allJobs.length===0) { el.innerHTML=`<div class="empty" style="padding:80px 20px"><svg viewBox="0 0 48 48" fill="none" stroke="currentColor" stroke-width="1.3"><circle cx="24" cy="24" r="20"/><path d="M18 16L33 24L18 32V16Z"/></svg><h3>Nenhum render ainda</h3><p>Inicie um render em um lote para ver os jobs aqui.</p><button class="btn btn-ghost" onclick="navigate(вҖҳbatchesвҖҷ)">Ir para Lotes &#8594;</button></div>`; return; }
    S.batches.filter(b=>['rendering','processing'].includes(b.status)).forEach(b=>startPoll(b.id));
    el.innerHTML=`<div style="display:flex;flex-direction:column;gap:7px">${allJobs.map(j=>`<div class="render-item" data-jid="${j.id}"><div><div class="r-name">${j.sourceVideo?.originalFilename||'video'}</div><div class="r-meta">Lote: ${j.batchName}</div></div><div class="r-prog-col"><div class="r-prog-top"><span class="job-badge">${badge(j.status)}</span><span class="r-pct">${j.progress||0}%</span></div>${prog(j.progress)}</div><div>${['done','completed'].includes(j.status)?`<button class="btn btn-ghost btn-sm" onclick="api.downloadRender('${j.id}','${j.sourceVideo?.originalFilename||'render.mp4'}')"><svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"><path d="M8 2v8M5 7l3 3 3-3"/><path d="M2 13h12"/></svg>Download</button>`:''}</div></div>`).join('')}</div>`;
  } catch(e) { el.innerHTML=`<div class="empty"><h3>Error</h3><p>${e.message}</p></div>`; }
}

/* ГўвҖқВҒГўвҖқВҒГўвҖқВҒГўвҖқВҒГўвҖқВҒГўвҖқВҒГўвҖқВҒГўвҖқВҒГўвҖқВҒГўвҖқВҒГўвҖқВҒГўвҖқВҒГўвҖқВҒГўвҖқВҒГўвҖқВҒГўвҖқВҒГўвҖқВҒГўвҖқВҒГўвҖқВҒГўвҖқВҒГўвҖқВҒГўвҖқВҒГўвҖқВҒГўвҖқВҒГўвҖқВҒГўвҖқВҒГўвҖқВҒГўвҖқВҒГўвҖқВҒГўвҖқВҒГўвҖқВҒГўвҖқВҒГўвҖқВҒГўвҖқВҒГўвҖқВҒГўвҖқВҒ

ГўвҖқВҒГўвҖқВҒГўвҖқВҒГўвҖқВҒГўвҖқВҒГўвҖқВҒГўвҖқВҒГўвҖқВҒГўвҖқВҒГўвҖқВҒГўвҖқВҒГўвҖқВҒГўвҖқВҒГўвҖқВҒГўвҖқВҒГўвҖқВҒГўвҖқВҒГўвҖқВҒГўвҖқВҒГўвҖқВҒГўвҖқВҒГўвҖқВҒГўвҖқВҒГўвҖқВҒГўвҖқВҒГўвҖқВҒГўвҖқВҒГўвҖқВҒГўвҖқВҒГўвҖқВҒГўвҖқВҒГўвҖқВҒГўвҖқВҒГўвҖқВҒГўвҖқВҒГўвҖқВҒ */

  const bd = document.createElement('div');
  bd.className = 'backdrop';
  bd.innerHTML = `<div class="modal">
    <div class=вҖқm-hdвҖқ><div class=вҖқm-titleвҖқ>Novo Template</div><button class=вҖқm-xвҖқ onclick=вҖқthis.closest('.backdrop').remove()вҖқ><svg viewBox=вҖқ0 0 16 16вҖқ fill=вҖқnoneвҖқ stroke=вҖқcurrentColorвҖқ stroke-width=вҖқ2вҖқ stroke-linecap=вҖқroundвҖқ><path d=вҖқM3 3l10 10M13 3L3 13вҖқ/></svg></button></div>

      <div class=вҖқfgвҖқ><label>Video do Template *</label>${mkUpz('tm-v',false)}</div>
    </div>

  </div>`;
  document.body.appendChild(bd);
  bd.addEventListener('click', e => { if (e.target===bd) bd.remove(); });
  const inp = document.getElementById('tm-v');
  if (inp) inp.addEventListener('change', e => { const f=e.target.files?.[0]; if(f) document.getElementById('tm-v-lbl').textContent=f.name; });
  const zone = document.getElementById('zone-tm-v');
  if (zone) {
    zone.addEventListener('dragover', e => { e.preventDefault(); zone.classList.add('drag'); });
    zone.addEventListener('dragleave', () => zone.classList.remove('drag'));
    zone.addEventListener('drop', e => { e.preventDefault(); zone.classList.remove('drag'); Object.defineProperty(inp,'files',{value:e.dataTransfer.files,configurable:true}); inp.dispatchEvent(new Event('change')); });
  }
  setTimeout(() => document.getElementById('tm-n')?.focus(), 80);
}

async function submitTemplate() {
  const name=document.getElementById('tm-n')?.value?.trim(), desc=document.getElementById('tm-d')?.value?.trim();
  const w=parseInt(document.getElementById('tm-w')?.value), h=parseInt(document.getElementById('tm-h')?.value);
  const dur=document.getElementById('tm-dur')?.value, vInp=document.getElementById('tm-v');
  if (!name) { toast('Nome obrigatГіrio','','error'); return; }
  if (!w||!h) { toast('Dimensoes obrigatГіrias','','error'); return; }
  if (!vInp?.files?.length) { toast('Video obrigatГіrio','Envie o video do template.','error'); return; }
  const btn=document.getElementById('tm-sub'); btn.disabled=true; btn.innerHTML=`${spin(13)} Criando...`;
  try {
    const fd=new FormData(); fd.append('video',vInp.files[0]); fd.append('name',name);
    if(desc) fd.append('description',desc); fd.append('outputWidth',w); fd.append('outputHeight',h); fd.append('durationMode',dur);
    await api.createTemplate(fd);
    toast('Template criado!',`"${name}" estГЎ pronto para uso.`,'success');
    document.querySelector('.backdrop')?.remove();
    if (S.view==='templates') await loadTemplates(document.getElementById('content'));
    if (S.view==='dashboard') await loadDashboard(document.getElementById('content'));
  } catch(e) { toast('Falha',e.message,'error'); btn.disabled=false; btn.textContent='Criar Template'; }
}
