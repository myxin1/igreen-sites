<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="480" viewBox="0 0 1200 480">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1A1008;stop-opacity:1"/>
      <stop offset="60%" style="stop-color:#2A1A0E;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#3D1A0A;stop-opacity:1"/>
    </linearGradient>
    <linearGradient id="lineGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#C8922A;stop-opacity:0"/>
      <stop offset="20%" style="stop-color:#C8922A;stop-opacity:1"/>
      <stop offset="80%" style="stop-color:#E8B84B;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#E8B84B;stop-opacity:0"/>
    </linearGradient>
    <pattern id="dots" x="0" y="0" width="40" height="40" patternUnits="userSpaceOnUse">
      <circle cx="20" cy="20" r="1" fill="#C8922A" opacity="0.15"/>
    </pattern>
  </defs>
  <rect width="1200" height="480" fill="url(#bgGrad)"/>
  <rect width="1200" height="480" fill="url(#dots)"/>
  <rect x="0" y="0" width="6" height="480" fill="#8B1A1A"/>
  <circle cx="980" cy="240" r="300" fill="#8B1A1A" opacity="0.07"/>
  <rect x="0" y="0" width="1200" height="3" fill="url(#lineGrad)" opacity="0.6"/>
  <rect x="0" y="477" width="1200" height="3" fill="url(#lineGrad)" opacity="0.6"/>
  <!-- Left text -->
  <text x="80" y="103" font-family="'Helvetica Neue',Helvetica,Arial,sans-serif" font-size="11" font-weight="400" letter-spacing="4" fill="#8B1A1A">FAQ</text>
  <rect x="80" y="108" width="40" height="1" fill="#8B1A1A" opacity="0.7"/>
  <text x="80" y="185" font-family="'Helvetica Neue',Helvetica,Arial,sans-serif" font-size="48" font-weight="300" fill="#F9F3E8" letter-spacing="6">Horário da</text>
  <text x="80" y="258" font-family="'Helvetica Neue',Helvetica,Arial,sans-serif" font-size="64" font-weight="700" fill="#E8B84B" letter-spacing="-1">Bauernfest</text>
  <text x="80" y="315" font-family="'Helvetica Neue',Helvetica,Arial,sans-serif" font-size="36" font-weight="300" fill="#F9F3E8" letter-spacing="4" opacity="0.8">Petrópolis 2026</text>
  <rect x="80" y="340" width="380" height="1" fill="#C8922A" opacity="0.4"/>
  <text x="80" y="365" font-family="'Helvetica Neue',Helvetica,Arial,sans-serif" font-size="14" font-weight="300" fill="#C8922A" letter-spacing="3" opacity="0.85">SEX/SÁB 12H–22H  ·  DOM/FER 11H–21H</text>
  <text x="80" y="428" font-family="'Helvetica Neue',Helvetica,Arial,sans-serif" font-size="12" font-weight="300" fill="#F9F3E8" letter-spacing="3" opacity="0.35">bauernfest.org/faq</text>
  <!-- Right: clock face -->
  <g transform="translate(870, 60)">
    <!-- Outer ring -->
    <circle cx="175" cy="185" r="160" fill="none" stroke="#C8922A" stroke-width="1" stroke-opacity="0.25"/>
    <circle cx="175" cy="185" r="155" fill="#8B1A1A" opacity="0.1"/>
    <circle cx="175" cy="185" r="130" fill="none" stroke="#C8922A" stroke-width="1" stroke-opacity="0.15"/>
    <!-- Hour markers -->
    <line x1="175" y1="30" x2="175" y2="50" stroke="#E8B84B" stroke-width="2" stroke-opacity="0.5"/>
    <line x1="175" y1="320" x2="175" y2="340" stroke="#C8922A" stroke-width="2" stroke-opacity="0.4"/>
    <line x1="20" y1="185" x2="40" y2="185" stroke="#C8922A" stroke-width="2" stroke-opacity="0.4"/>
    <line x1="310" y1="185" x2="330" y2="185" stroke="#C8922A" stroke-width="2" stroke-opacity="0.4"/>
    <!-- Hour labels -->
    <text x="175" y="72" font-family="'Helvetica Neue',Helvetica,Arial,sans-serif" font-size="16" font-weight="300" fill="#E8B84B" text-anchor="middle" opacity="0.6">12</text>
    <text x="326" y="191" font-family="'Helvetica Neue',Helvetica,Arial,sans-serif" font-size="16" font-weight="300" fill="#C8922A" text-anchor="middle" opacity="0.5">3</text>
    <text x="175" y="336" font-family="'Helvetica Neue',Helvetica,Arial,sans-serif" font-size="16" font-weight="300" fill="#C8922A" text-anchor="middle" opacity="0.5">6</text>
    <text x="24" y="191" font-family="'Helvetica Neue',Helvetica,Arial,sans-serif" font-size="16" font-weight="300" fill="#C8922A" text-anchor="middle" opacity="0.5">9</text>
    <!-- Hour hand (pointing to ~6 = 18h) -->
    <line x1="175" y1="185" x2="175" y2="310" stroke="#E8B84B" stroke-width="3" stroke-linecap="round" opacity="0.7"/>
    <!-- Minute hand (pointing to 12) -->
    <line x1="175" y1="185" x2="175" y2="60" stroke="#F9F3E8" stroke-width="2" stroke-linecap="round" opacity="0.5"/>
    <!-- Center dot -->
    <circle cx="175" cy="185" r="5" fill="#E8B84B" opacity="0.7"/>
    <circle cx="175" cy="185" r="2" fill="#1A1008"/>
    <!-- Time labels around clock -->
    <text x="175" y="215" font-family="'Helvetica Neue',Helvetica,Arial,sans-serif" font-size="13" font-weight="300" fill="#C8922A" text-anchor="middle" letter-spacing="2" opacity="0.45">12h — 22h</text>
  </g>
  <text x="1120" y="455" font-family="'Helvetica Neue',Helvetica,Arial,sans-serif" font-size="11" font-weight="300" fill="#C8922A" text-anchor="end" letter-spacing="3" opacity="0.4">bauernfest.org</text>
</svg>
