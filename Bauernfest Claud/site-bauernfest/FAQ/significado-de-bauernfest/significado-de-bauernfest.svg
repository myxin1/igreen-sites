<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="480" viewBox="0 0 1200 480">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1A1008;stop-opacity:1"/>
      <stop offset="60%" style="stop-color:#2A1A0E;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#3D1A0A;stop-opacity:1"/>
    </linearGradient>
    <linearGradient id="lineGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#C8922A;stop-opacity:0"/>
      <stop offset="20%" style="stop-color:#C8922A;stop-opacity:1"/>
      <stop offset="80%" style="stop-color:#E8B84B;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#E8B84B;stop-opacity:0"/>
    </linearGradient>
    <pattern id="dots" x="0" y="0" width="40" height="40" patternUnits="userSpaceOnUse">
      <circle cx="20" cy="20" r="1" fill="#C8922A" opacity="0.15"/>
    </pattern>
  </defs>
  <rect width="1200" height="480" fill="url(#bgGrad)"/>
  <rect width="1200" height="480" fill="url(#dots)"/>
  <rect x="0" y="0" width="6" height="480" fill="#8B1A1A"/>
  <circle cx="980" cy="240" r="300" fill="#8B1A1A" opacity="0.07"/>
  <rect x="0" y="0" width="1200" height="3" fill="url(#lineGrad)" opacity="0.6"/>
  <rect x="0" y="477" width="1200" height="3" fill="url(#lineGrad)" opacity="0.6"/>
  <!-- Left text -->
  <text x="80" y="103" font-family="'Helvetica Neue',Helvetica,Arial,sans-serif" font-size="11" font-weight="400" letter-spacing="4" fill="#8B1A1A">FAQ</text>
  <rect x="80" y="108" width="40" height="1" fill="#8B1A1A" opacity="0.7"/>
  <text x="80" y="185" font-family="'Helvetica Neue',Helvetica,Arial,sans-serif" font-size="48" font-weight="300" fill="#F9F3E8" letter-spacing="6">Significado de</text>
  <text x="80" y="258" font-family="'Helvetica Neue',Helvetica,Arial,sans-serif" font-size="64" font-weight="700" fill="#E8B84B" letter-spacing="-1">Bauernfest</text>
  <text x="80" y="315" font-family="'Helvetica Neue',Helvetica,Arial,sans-serif" font-size="36" font-weight="300" fill="#F9F3E8" letter-spacing="4" opacity="0.8">Festa dos Lavradores</text>
  <rect x="80" y="340" width="380" height="1" fill="#C8922A" opacity="0.4"/>
  <text x="80" y="365" font-family="'Helvetica Neue',Helvetica,Arial,sans-serif" font-size="14" font-weight="300" fill="#C8922A" letter-spacing="3" opacity="0.85">BAUER = LAVRADOR  ·  FEST = FESTA  ·  ALEMÃO</text>
  <text x="80" y="428" font-family="'Helvetica Neue',Helvetica,Arial,sans-serif" font-size="12" font-weight="300" fill="#F9F3E8" letter-spacing="3" opacity="0.35">bauernfest.org/faq</text>
  <!-- Right: word breakdown BAUER + FEST -->
  <g transform="translate(770, 80)">
    <!-- BAUER block -->
    <rect x="20" y="80" width="180" height="120" rx="4" fill="#8B1A1A" opacity="0.2" stroke="#C8922A" stroke-width="1" stroke-opacity="0.3"/>
    <text x="110" y="132" font-family="'Helvetica Neue',Helvetica,Arial,sans-serif" font-size="42" font-weight="700" fill="#E8B84B" opacity="0.7" text-anchor="middle" letter-spacing="2">BAUER</text>
    <text x="110" y="158" font-family="'Helvetica Neue',Helvetica,Arial,sans-serif" font-size="13" font-weight="300" fill="#F9F3E8" opacity="0.4" text-anchor="middle" letter-spacing="3">lavrador</text>
    <!-- + -->
    <text x="230" y="152" font-family="'Helvetica Neue',Helvetica,Arial,sans-serif" font-size="36" font-weight="100" fill="#C8922A" opacity="0.5" text-anchor="middle">+</text>
    <!-- FEST block -->
    <rect x="250" y="80" width="150" height="120" rx="4" fill="#8B1A1A" opacity="0.2" stroke="#C8922A" stroke-width="1" stroke-opacity="0.3"/>
    <text x="325" y="132" font-family="'Helvetica Neue',Helvetica,Arial,sans-serif" font-size="42" font-weight="700" fill="#E8B84B" opacity="0.7" text-anchor="middle" letter-spacing="2">FEST</text>
    <text x="325" y="158" font-family="'Helvetica Neue',Helvetica,Arial,sans-serif" font-size="13" font-weight="300" fill="#F9F3E8" opacity="0.4" text-anchor="middle" letter-spacing="3">festa</text>
    <!-- = result -->
    <line x1="20" y1="230" x2="400" y2="230" stroke="#C8922A" stroke-width="1" stroke-opacity="0.25"/>
    <text x="210" y="275" font-family="'Helvetica Neue',Helvetica,Arial,sans-serif" font-size="20" font-weight="300" fill="#F9F3E8" opacity="0.35" text-anchor="middle" letter-spacing="4">FESTA DOS LAVRADORES</text>
    <!-- DE flag colors subtle stripes -->
    <rect x="20" y="295" width="133" height="10" rx="1" fill="#1A1008" opacity="0.6"/>
    <rect x="20" y="295" width="133" height="10" rx="1" fill="#CC0000" opacity="0.3"/>
    <rect x="153" y="295" width="133" height="10" rx="1" fill="#CC0000" opacity="0.3"/>
    <rect x="153" y="295" width="133" height="10" rx="1" fill="#FFCE00" opacity="0.25"/>
    <rect x="286" y="295" width="114" height="10" rx="1" fill="#FFCE00" opacity="0.3"/>
    <text x="210" y="325" font-family="'Helvetica Neue',Helvetica,Arial,sans-serif" font-size="10" font-weight="300" fill="#F9F3E8" opacity="0.25" text-anchor="middle" letter-spacing="3">ALEMÃO</text>
  </g>
  <text x="1120" y="455" font-family="'Helvetica Neue',Helvetica,Arial,sans-serif" font-size="11" font-weight="300" fill="#C8922A" text-anchor="end" letter-spacing="3" opacity="0.4">bauernfest.org</text>
</svg>
