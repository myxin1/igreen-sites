<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="480" viewBox="0 0 1200 480">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1A1008;stop-opacity:1"/>
      <stop offset="60%" style="stop-color:#2A1A0E;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#3D1A0A;stop-opacity:1"/>
    </linearGradient>
    <linearGradient id="lineGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#C8922A;stop-opacity:0"/>
      <stop offset="20%" style="stop-color:#C8922A;stop-opacity:1"/>
      <stop offset="80%" style="stop-color:#E8B84B;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#E8B84B;stop-opacity:0"/>
    </linearGradient>
    <pattern id="dots" x="0" y="0" width="40" height="40" patternUnits="userSpaceOnUse">
      <circle cx="20" cy="20" r="1" fill="#C8922A" opacity="0.15"/>
    </pattern>
  </defs>
  <rect width="1200" height="480" fill="url(#bgGrad)"/>
  <rect width="1200" height="480" fill="url(#dots)"/>
  <rect x="0" y="0" width="6" height="480" fill="#8B1A1A"/>
  <circle cx="980" cy="240" r="300" fill="#8B1A1A" opacity="0.07"/>
  <rect x="0" y="0" width="1200" height="3" fill="url(#lineGrad)" opacity="0.6"/>
  <rect x="0" y="477" width="1200" height="3" fill="url(#lineGrad)" opacity="0.6"/>
  <!-- Left text -->
  <text x="80" y="103" font-family="'Helvetica Neue',Helvetica,Arial,sans-serif" font-size="11" font-weight="400" letter-spacing="4" fill="#8B1A1A">FAQ</text>
  <rect x="80" y="108" width="40" height="1" fill="#8B1A1A" opacity="0.7"/>
  <text x="80" y="185" font-family="'Helvetica Neue',Helvetica,Arial,sans-serif" font-size="48" font-weight="300" fill="#F9F3E8" letter-spacing="6">O que fazer</text>
  <text x="80" y="258" font-family="'Helvetica Neue',Helvetica,Arial,sans-serif" font-size="64" font-weight="700" fill="#E8B84B" letter-spacing="-1">na Bauernfest?</text>
  <text x="80" y="315" font-family="'Helvetica Neue',Helvetica,Arial,sans-serif" font-size="36" font-weight="300" fill="#F9F3E8" letter-spacing="4" opacity="0.8">Gastronomia · Dança · Shows</text>
  <rect x="80" y="340" width="380" height="1" fill="#C8922A" opacity="0.4"/>
  <text x="80" y="365" font-family="'Helvetica Neue',Helvetica,Arial,sans-serif" font-size="14" font-weight="300" fill="#C8922A" letter-spacing="3" opacity="0.85">CHOPP  ·  MÚSICA AO VIVO  ·  ARTESANATO  ·  FOLCLORE</text>
  <text x="80" y="428" font-family="'Helvetica Neue',Helvetica,Arial,sans-serif" font-size="12" font-weight="300" fill="#F9F3E8" letter-spacing="3" opacity="0.35">bauernfest.org/faq</text>
  <!-- Right: 4 activity icons in a 2x2 grid -->
  <g transform="translate(820, 80)">
    <!-- Grid lines -->
    <line x1="175" y1="60" x2="175" y2="320" stroke="#C8922A" stroke-width="1" stroke-opacity="0.2"/>
    <line x1="40" y1="190" x2="310" y2="190" stroke="#C8922A" stroke-width="1" stroke-opacity="0.2"/>
    <!-- Top-left: Fork (gastronomia) -->
    <text x="107" y="155" font-family="Arial,sans-serif" font-size="64" fill="#C8922A" opacity="0.35" text-anchor="middle">🍺</text>
    <text x="107" y="178" font-family="'Helvetica Neue',Helvetica,Arial,sans-serif" font-size="10" font-weight="300" fill="#F9F3E8" opacity="0.35" text-anchor="middle" letter-spacing="2">GASTRONOMIA</text>
    <!-- Top-right: Music (shows) -->
    <text x="243" y="155" font-family="Arial,sans-serif" font-size="64" fill="#C8922A" opacity="0.35" text-anchor="middle">🎵</text>
    <text x="243" y="178" font-family="'Helvetica Neue',Helvetica,Arial,sans-serif" font-size="10" font-weight="300" fill="#F9F3E8" opacity="0.35" text-anchor="middle" letter-spacing="2">MÚSICA</text>
    <!-- Bottom-left: Dance -->
    <text x="107" y="280" font-family="Arial,sans-serif" font-size="64" fill="#C8922A" opacity="0.35" text-anchor="middle">💃</text>
    <text x="107" y="303" font-family="'Helvetica Neue',Helvetica,Arial,sans-serif" font-size="10" font-weight="300" fill="#F9F3E8" opacity="0.35" text-anchor="middle" letter-spacing="2">DANÇA</text>
    <!-- Bottom-right: Craft -->
    <text x="243" y="280" font-family="Arial,sans-serif" font-size="64" fill="#C8922A" opacity="0.35" text-anchor="middle">🏺</text>
    <text x="243" y="303" font-family="'Helvetica Neue',Helvetica,Arial,sans-serif" font-size="10" font-weight="300" fill="#F9F3E8" opacity="0.35" text-anchor="middle" letter-spacing="2">ARTESANATO</text>
  </g>
  <text x="1120" y="455" font-family="'Helvetica Neue',Helvetica,Arial,sans-serif" font-size="11" font-weight="300" fill="#C8922A" text-anchor="end" letter-spacing="3" opacity="0.4">bauernfest.org</text>
</svg>
