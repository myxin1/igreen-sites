<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="480" viewBox="0 0 1200 480">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1A1008;stop-opacity:1" />
      <stop offset="60%" style="stop-color:#2A1A0E;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#3D1A0A;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="accentGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#8B1A1A;stop-opacity:0" />
      <stop offset="30%" style="stop-color:#8B1A1A;stop-opacity:1" />
      <stop offset="70%" style="stop-color:#C8922A;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#C8922A;stop-opacity:0" />
    </linearGradient>
    <linearGradient id="lineGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#C8922A;stop-opacity:0" />
      <stop offset="20%" style="stop-color:#C8922A;stop-opacity:1" />
      <stop offset="80%" style="stop-color:#E8B84B;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#E8B84B;stop-opacity:0" />
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <pattern id="dots" x="0" y="0" width="40" height="40" patternUnits="userSpaceOnUse">
      <circle cx="20" cy="20" r="1" fill="#C8922A" opacity="0.15"/>
    </pattern>
  </defs>

  <!-- Background -->
  <rect width="1200" height="480" fill="url(#bgGrad)"/>
  <rect width="1200" height="480" fill="url(#dots)"/>

  <!-- Left dark vignette -->
  <rect width="300" height="480" fill="url(#bgGrad)" opacity="0.5"/>

  <!-- Red side bar -->
  <rect x="0" y="0" width="6" height="480" fill="#8B1A1A"/>

  <!-- Decorative large circle (background) -->
  <circle cx="980" cy="240" r="320" fill="#8B1A1A" opacity="0.07"/>
  <circle cx="980" cy="240" r="240" fill="#C8922A" opacity="0.05"/>

  <!-- Top accent line -->
  <rect x="0" y="0" width="1200" height="3" fill="url(#lineGrad)" opacity="0.6"/>

  <!-- Bottom accent line -->
  <rect x="0" y="477" width="1200" height="3" fill="url(#lineGrad)" opacity="0.6"/>

  <!-- Horizontal divider line -->
  <rect x="80" y="230" width="500" height="1" fill="url(#lineGrad)" opacity="0.5"/>

  <!-- Category badge -->
  <rect x="80" y="108" width="60" height="1" fill="#8B1A1A"/>
  <text x="80" y="103" font-family="'Helvetica Neue', Helvetica, Arial, sans-serif" font-size="11" font-weight="400" letter-spacing="4" fill="#8B1A1A" opacity="0.9">FAQ</text>

  <!-- Main keyword — line 1 -->
  <text x="80" y="185" font-family="'Helvetica Neue', Helvetica, Arial, sans-serif" font-size="48" font-weight="300" fill="#F9F3E8" letter-spacing="6">Quando é a</text>

  <!-- Main keyword — line 2 (highlight) -->
  <text x="80" y="258" font-family="'Helvetica Neue', Helvetica, Arial, sans-serif" font-size="64" font-weight="700" fill="#E8B84B" letter-spacing="-1">Bauernfest</text>

  <!-- Main keyword — line 3 -->
  <text x="80" y="318" font-family="'Helvetica Neue', Helvetica, Arial, sans-serif" font-size="48" font-weight="300" fill="#F9F3E8" letter-spacing="6">Petrópolis?</text>

  <!-- Thin divider -->
  <rect x="80" y="345" width="380" height="1" fill="#C8922A" opacity="0.4"/>

  <!-- Subtitle -->
  <text x="80" y="370" font-family="'Helvetica Neue', Helvetica, Arial, sans-serif" font-size="14" font-weight="300" fill="#C8922A" letter-spacing="3" opacity="0.85">19 JUN  ·  5 JUL  ·  2026  ·  PALÁCIO DE CRISTAL</text>

  <!-- Site URL -->
  <text x="80" y="428" font-family="'Helvetica Neue', Helvetica, Arial, sans-serif" font-size="12" font-weight="300" fill="#F9F3E8" letter-spacing="3" opacity="0.35">bauernfest.org/faq</text>

  <!-- Right decorative — calendar icon -->
  <g transform="translate(860, 120)">
    <!-- Calendar box -->
    <rect x="0" y="0" width="220" height="240" rx="4" fill="#8B1A1A" opacity="0.15" stroke="#C8922A" stroke-width="1" stroke-opacity="0.3"/>
    <!-- Calendar header -->
    <rect x="0" y="0" width="220" height="50" rx="4" fill="#8B1A1A" opacity="0.5"/>
    <rect x="0" y="35" width="220" height="15" fill="#8B1A1A" opacity="0.5"/>
    <!-- Month label -->
    <text x="110" y="32" font-family="'Helvetica Neue', Helvetica, Arial, sans-serif" font-size="13" font-weight="300" fill="#E8B84B" text-anchor="middle" letter-spacing="6">JUNHO</text>
    <!-- Day grid -->
    <!-- Row 1: dias semana -->
    <text x="28" y="78" font-family="'Helvetica Neue', Helvetica, Arial, sans-serif" font-size="10" font-weight="300" fill="#C8922A" text-anchor="middle" letter-spacing="1" opacity="0.7">D</text>
    <text x="60" y="78" font-family="'Helvetica Neue', Helvetica, Arial, sans-serif" font-size="10" font-weight="300" fill="#C8922A" text-anchor="middle" letter-spacing="1" opacity="0.7">S</text>
    <text x="92" y="78" font-family="'Helvetica Neue', Helvetica, Arial, sans-serif" font-size="10" font-weight="300" fill="#C8922A" text-anchor="middle" letter-spacing="1" opacity="0.7">T</text>
    <text x="124" y="78" font-family="'Helvetica Neue', Helvetica, Arial, sans-serif" font-size="10" font-weight="300" fill="#C8922A" text-anchor="middle" letter-spacing="1" opacity="0.7">Q</text>
    <text x="156" y="78" font-family="'Helvetica Neue', Helvetica, Arial, sans-serif" font-size="10" font-weight="300" fill="#C8922A" text-anchor="middle" letter-spacing="1" opacity="0.7">Q</text>
    <text x="188" y="78" font-family="'Helvetica Neue', Helvetica, Arial, sans-serif" font-size="10" font-weight="300" fill="#C8922A" text-anchor="middle" letter-spacing="1" opacity="0.7">S</text>
    <!-- Divider -->
    <rect x="15" y="83" width="190" height="1" fill="#C8922A" opacity="0.15"/>
    <!-- Days row 1 -->
    <text x="124" y="108" font-family="'Helvetica Neue', Helvetica, Arial, sans-serif" font-size="13" font-weight="300" fill="#F9F3E8" text-anchor="middle" opacity="0.5">1</text>
    <text x="156" y="108" font-family="'Helvetica Neue', Helvetica, Arial, sans-serif" font-size="13" font-weight="300" fill="#F9F3E8" text-anchor="middle" opacity="0.5">2</text>
    <text x="188" y="108" font-family="'Helvetica Neue', Helvetica, Arial, sans-serif" font-size="13" font-weight="300" fill="#F9F3E8" text-anchor="middle" opacity="0.5">3</text>
    <!-- Days row 2 -->
    <text x="28" y="136" font-family="'Helvetica Neue', Helvetica, Arial, sans-serif" font-size="13" font-weight="300" fill="#F9F3E8" text-anchor="middle" opacity="0.5">8</text>
    <text x="60" y="136" font-family="'Helvetica Neue', Helvetica, Arial, sans-serif" font-size="13" font-weight="300" fill="#F9F3E8" text-anchor="middle" opacity="0.5">9</text>
    <text x="92" y="136" font-family="'Helvetica Neue', Helvetica, Arial, sans-serif" font-size="13" font-weight="300" fill="#F9F3E8" text-anchor="middle" opacity="0.5">10</text>
    <text x="124" y="136" font-family="'Helvetica Neue', Helvetica, Arial, sans-serif" font-size="13" font-weight="300" fill="#F9F3E8" text-anchor="middle" opacity="0.5">11</text>
    <text x="156" y="136" font-family="'Helvetica Neue', Helvetica, Arial, sans-serif" font-size="13" font-weight="300" fill="#F9F3E8" text-anchor="middle" opacity="0.5">12</text>
    <text x="188" y="136" font-family="'Helvetica Neue', Helvetica, Arial, sans-serif" font-size="13" font-weight="300" fill="#F9F3E8" text-anchor="middle" opacity="0.5">13</text>
    <!-- Days row 3 — 19 highlighted -->
    <text x="28" y="164" font-family="'Helvetica Neue', Helvetica, Arial, sans-serif" font-size="13" font-weight="300" fill="#F9F3E8" text-anchor="middle" opacity="0.5">15</text>
    <text x="60" y="164" font-family="'Helvetica Neue', Helvetica, Arial, sans-serif" font-size="13" font-weight="300" fill="#F9F3E8" text-anchor="middle" opacity="0.5">16</text>
    <text x="92" y="164" font-family="'Helvetica Neue', Helvetica, Arial, sans-serif" font-size="13" font-weight="300" fill="#F9F3E8" text-anchor="middle" opacity="0.5">17</text>
    <text x="124" y="164" font-family="'Helvetica Neue', Helvetica, Arial, sans-serif" font-size="13" font-weight="300" fill="#F9F3E8" text-anchor="middle" opacity="0.5">18</text>
    <rect x="142" y="151" width="28" height="28" rx="2" fill="#E8B84B" opacity="0.95"/>
    <text x="156" y="170" font-family="'Helvetica Neue', Helvetica, Arial, sans-serif" font-size="13" font-weight="600" fill="#1A1008" text-anchor="middle">19</text>
    <text x="188" y="164" font-family="'Helvetica Neue', Helvetica, Arial, sans-serif" font-size="13" font-weight="300" fill="#F9F3E8" text-anchor="middle" opacity="0.5">20</text>
    <!-- Days row 4 -->
    <text x="28" y="196" font-family="'Helvetica Neue', Helvetica, Arial, sans-serif" font-size="13" font-weight="300" fill="#F9F3E8" text-anchor="middle" opacity="0.5">22</text>
    <text x="60" y="196" font-family="'Helvetica Neue', Helvetica, Arial, sans-serif" font-size="13" font-weight="300" fill="#F9F3E8" text-anchor="middle" opacity="0.5">23</text>
    <text x="92" y="196" font-family="'Helvetica Neue', Helvetica, Arial, sans-serif" font-size="13" font-weight="300" fill="#F9F3E8" text-anchor="middle" opacity="0.5">24</text>
    <text x="124" y="196" font-family="'Helvetica Neue', Helvetica, Arial, sans-serif" font-size="13" font-weight="300" fill="#F9F3E8" text-anchor="middle" opacity="0.5">25</text>
    <text x="156" y="196" font-family="'Helvetica Neue', Helvetica, Arial, sans-serif" font-size="13" font-weight="300" fill="#F9F3E8" text-anchor="middle" opacity="0.5">26</text>
    <text x="188" y="196" font-family="'Helvetica Neue', Helvetica, Arial, sans-serif" font-size="13" font-weight="300" fill="#F9F3E8" text-anchor="middle" opacity="0.5">27</text>
    <!-- Calendar ring decorations (minimal) -->
    <line x1="65" y1="0" x2="65" y2="10" stroke="#C8922A" stroke-width="1.5" opacity="0.4"/>
    <line x1="155" y1="0" x2="155" y2="10" stroke="#C8922A" stroke-width="1.5" opacity="0.4"/>
  </g>

  <!-- Bottom right branding -->
  <text x="1120" y="455" font-family="'Helvetica Neue', Helvetica, Arial, sans-serif" font-size="11" font-weight="300" fill="#C8922A" text-anchor="end" letter-spacing="3" opacity="0.4">bauernfest.org</text>
</svg>
