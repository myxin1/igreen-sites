<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="480" viewBox="0 0 1200 480">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1A1008;stop-opacity:1"/>
      <stop offset="60%" style="stop-color:#2A1A0E;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#3D1A0A;stop-opacity:1"/>
    </linearGradient>
    <linearGradient id="lineGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#C8922A;stop-opacity:0"/>
      <stop offset="20%" style="stop-color:#C8922A;stop-opacity:1"/>
      <stop offset="80%" style="stop-color:#E8B84B;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#E8B84B;stop-opacity:0"/>
    </linearGradient>
    <pattern id="dots" x="0" y="0" width="40" height="40" patternUnits="userSpaceOnUse">
      <circle cx="20" cy="20" r="1" fill="#C8922A" opacity="0.15"/>
    </pattern>
  </defs>
  <rect width="1200" height="480" fill="url(#bgGrad)"/>
  <rect width="1200" height="480" fill="url(#dots)"/>
  <rect x="0" y="0" width="6" height="480" fill="#8B1A1A"/>
  <circle cx="980" cy="240" r="300" fill="#8B1A1A" opacity="0.07"/>
  <rect x="0" y="0" width="1200" height="3" fill="url(#lineGrad)" opacity="0.6"/>
  <rect x="0" y="477" width="1200" height="3" fill="url(#lineGrad)" opacity="0.6"/>
  <!-- Left text -->
  <text x="80" y="103" font-family="'Helvetica Neue',Helvetica,Arial,sans-serif" font-size="11" font-weight="400" letter-spacing="4" fill="#8B1A1A">FAQ</text>
  <rect x="80" y="108" width="40" height="1" fill="#8B1A1A" opacity="0.7"/>
  <text x="80" y="185" font-family="'Helvetica Neue',Helvetica,Arial,sans-serif" font-size="48" font-weight="300" fill="#F9F3E8" letter-spacing="6">Como funciona</text>
  <text x="80" y="258" font-family="'Helvetica Neue',Helvetica,Arial,sans-serif" font-size="64" font-weight="700" fill="#E8B84B" letter-spacing="-1">a Bauernfest?</text>
  <text x="80" y="315" font-family="'Helvetica Neue',Helvetica,Arial,sans-serif" font-size="36" font-weight="300" fill="#F9F3E8" letter-spacing="4" opacity="0.8">Entrada gratuita</text>
  <rect x="80" y="340" width="380" height="1" fill="#C8922A" opacity="0.4"/>
  <text x="80" y="365" font-family="'Helvetica Neue',Helvetica,Arial,sans-serif" font-size="14" font-weight="300" fill="#C8922A" letter-spacing="3" opacity="0.85">GASTRONOMIA  ·  PALCO  ·  ARTESANATO  ·  PALÁCIO</text>
  <text x="80" y="428" font-family="'Helvetica Neue',Helvetica,Arial,sans-serif" font-size="12" font-weight="300" fill="#F9F3E8" letter-spacing="3" opacity="0.35">bauernfest.org/faq</text>
  <!-- Right: abstract floor map -->
  <g transform="translate(800, 80)">
    <!-- Outer boundary -->
    <rect x="20" y="20" width="340" height="320" rx="4" fill="none" stroke="#C8922A" stroke-width="1" stroke-opacity="0.25"/>
    <!-- Zone: Gastronomia (large, top-left) -->
    <rect x="30" y="30" width="180" height="140" rx="3" fill="#8B1A1A" opacity="0.2" stroke="#C8922A" stroke-width="1" stroke-opacity="0.3"/>
    <text x="120" y="95" font-family="'Helvetica Neue',Helvetica,Arial,sans-serif" font-size="11" font-weight="300" fill="#E8B84B" opacity="0.5" text-anchor="middle" letter-spacing="2">GASTRO-</text>
    <text x="120" y="110" font-family="'Helvetica Neue',Helvetica,Arial,sans-serif" font-size="11" font-weight="300" fill="#E8B84B" opacity="0.5" text-anchor="middle" letter-spacing="2">NOMIA</text>
    <!-- Zone: Palco (top-right) -->
    <rect x="220" y="30" width="130" height="140" rx="3" fill="#C8922A" opacity="0.1" stroke="#E8B84B" stroke-width="1" stroke-opacity="0.3"/>
    <text x="285" y="105" font-family="'Helvetica Neue',Helvetica,Arial,sans-serif" font-size="11" font-weight="300" fill="#E8B84B" opacity="0.5" text-anchor="middle" letter-spacing="2">PALCO</text>
    <!-- Zone: Artesanato (bottom-left) -->
    <rect x="30" y="180" width="130" height="150" rx="3" fill="#8B1A1A" opacity="0.15" stroke="#C8922A" stroke-width="1" stroke-opacity="0.25"/>
    <text x="95" y="262" font-family="'Helvetica Neue',Helvetica,Arial,sans-serif" font-size="10" font-weight="300" fill="#E8B84B" opacity="0.45" text-anchor="middle" letter-spacing="1">ARTESANATO</text>
    <!-- Zone: Palácio de Cristal (bottom-right, highlighted) -->
    <rect x="170" y="180" width="180" height="150" rx="3" fill="#C8922A" opacity="0.12" stroke="#E8B84B" stroke-width="1.5" stroke-opacity="0.4"/>
    <text x="260" y="250" font-family="'Helvetica Neue',Helvetica,Arial,sans-serif" font-size="10" font-weight="300" fill="#E8B84B" opacity="0.55" text-anchor="middle" letter-spacing="1">PALÁCIO DE</text>
    <text x="260" y="265" font-family="'Helvetica Neue',Helvetica,Arial,sans-serif" font-size="10" font-weight="300" fill="#E8B84B" opacity="0.55" text-anchor="middle" letter-spacing="1">CRISTAL</text>
    <!-- Entry point -->
    <rect x="160" y="326" width="60" height="14" rx="2" fill="#E8B84B" opacity="0.3"/>
    <text x="190" y="337" font-family="'Helvetica Neue',Helvetica,Arial,sans-serif" font-size="9" font-weight="300" fill="#1A1008" opacity="0.7" text-anchor="middle" letter-spacing="1">ENTRADA</text>
    <!-- Pathways -->
    <line x1="210" y1="30" x2="210" y2="170" stroke="#C8922A" stroke-width="1" stroke-opacity="0.15" stroke-dasharray="4,4"/>
    <line x1="160" y1="180" x2="160" y2="326" stroke="#C8922A" stroke-width="1" stroke-opacity="0.15" stroke-dasharray="4,4"/>
  </g>
  <text x="1120" y="455" font-family="'Helvetica Neue',Helvetica,Arial,sans-serif" font-size="11" font-weight="300" fill="#C8922A" text-anchor="end" letter-spacing="3" opacity="0.4">bauernfest.org</text>
</svg>
